name: satenv
channels:
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.11
  - pip
  
  # Geospatial (conda-forge for binary compatibility)
  - gdal=3.6.4
  - rasterio=1.4.3
  - fiona=1.9.1
  - geopandas=0.14.4
  - shapely=2.1.2
  - pyproj=3.7.2
  - affine=2.4.0
  - rioxarray=0.19.0
  - rtree=1.4.1
  
  # Visualization
  - matplotlib=3.10.8
  - folium=0.20.0
  - plotly=6.5.0
  
  # Scientific computing
  - numpy=2.2.6
  - pandas=2.3.3
  - scipy=1.14.1
  - scikit-learn=1.7.2
  - networkx=3.6
  
  # Data formats
  - netcdf4=1.7.4
  - h5py=3.15.1
  - xarray=2025.1.1
  
  # Jupyter
  - jupyter=1.1.1
  - jupyterlab=4.5.0
  - ipywidgets=8.1.8
  - ipykernel=7.1.0
  
  # Development tools
  - pytest=8.4.2
  - flake8=7.3.0
  - git=2.44.0
  
  # Build and system
  - libgdal=3.6.2
  - libspatialite=5.1.0
  - proj=9.3.1
  
  # pip-only packages (those not in conda-forge)
  - pip
  - pip:
      # Note: Using git commit instead of PyPI because latest PyPI is 0.12.15 (old Scihub auth)
      # This commit is a dev version with Copernicus Data Space auth support
      # opensartoolkit==0.13.1 does NOT exist on PyPI
      - git+https://github.com/ESA-PhiLab/OpenSarToolkit.git@1bb66ab8db02cf523489e42d0bc751984fa3cdaf#egg=opensartoolkit
      - openeo==0.47.0
      - leafmap==0.57.9
      - localtileserver==0.10.6
      - rio-cogeo==7.0.0
      - rio-tiler==8.0.1
      - pystac==1.14.1
      - pystac-client==0.9.0
      - gdown==5.2.0
      - godale==0.3
      - phidown==0.1.23
      - pydantic==2.12.5
      - python-dotenv==1.0.0
      - pyyaml==6.0.3
      - sphinx==7.4.7
      - sphinx-rtd-theme==3.0.2
      - sphinx-autoapi==3.6.1
      - torch==2.9.1+cpu
      - torchvision==0.24.1+cpu
      - whitebox==2.3.6
      - whiteboxgui==2.3.0
      - h5netcdf==1.8.0
      - duckdb==1.4.2
      - s5cmd==0.3.3
      - fsspec==2025.9.0
      - ipyleaflet==0.20.0
      - jupyter-leaflet==0.20.0
      - maplibre==0.3.5
      - httpx==0.28.1
      - flask==3.1.2
      - flask-cors==6.0.1
      - flask-restx==1.3.2
      - uvicorn==0.38.0
      - opencv-python==4.12.0.88
      - imageio==2.37.2